<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Executive Presence</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --bg-color: #f5f2ed; /* Warm Beige - Sangat nyaman di mata */
            --text-dark: #1a1a1a;
            --accent: #4a5d4e; /* Sage Green gelap - Profesional & Tenang */
            --white: #ffffff;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- LUXURY ENTRANCE --- */
        .loader {
            position: fixed;
            inset: 0;
            background: var(--text-dark);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .loader-content {
            color: var(--bg-color);
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            letter-spacing: 0.5rem;
            overflow: hidden;
        }

        .loader-text {
            display: inline-block;
            transform: translateY(100%);
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 2rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            opacity: 0;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
        }

        .hero-sub {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--accent);
            margin-bottom: 1rem;
            display: block;
            opacity: 0;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 600;
            line-height: 1.1;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(30px);
        }

        /* --- CONTACT SECTION (PROFESSIONAL) --- */
        .contact {
            padding: 120px 10%;
            background: var(--white);
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: start;
        }

        .contact-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 1.5rem;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .field {
            position: relative;
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }

        .field label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            display: block;
            margin-bottom: 5px;
        }

        .field input, .field textarea {
            width: 100%;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-dark);
            outline: none;
            padding: 5px 0;
        }

        .btn-submit {
            align-self: flex-start;
            padding: 1.2rem 3rem;
            background: var(--text-dark);
            color: var(--white);
            border: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-submit:hover {
            background: var(--accent);
            padding-right: 4rem;
        }

        footer {
            padding: 4rem 10%;
            font-size: 0.8rem;
            color: #888;
            text-align: center;
        }

        @media (max-width: 768px) {
            .contact-grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="loader">
        <div class="loader-content">
            <span class="loader-text">ESTABLISHED 2026</span>
        </div>
    </div>

    <nav id="nav">
        <div class="logo">PORTFOLIO.</div>
        <div style="font-size: 0.8rem;">MENU</div>
    </nav>

    <main>
        <section class="hero">
            <span class="hero-sub" id="sub">Digital Strategist & Developer</span>
            <h1 id="title">Crafting <br><i>meaningful</i> <br>experiences.</h1>
        </section>

        <section class="contact" id="contact">
            <div class="contact-grid">
                <div class="contact-header">
                    <h2>Katakan Halo.</h2>
                    <p>Saya selalu terbuka untuk kolaborasi strategis dan proyek kreatif yang menantang.</p>
                </div>

                <form class="contact-form" id="portfolioForm">
                    <div class="field">
                        <label>Nama Anda</label>
                        <input type="text" name="nama" placeholder="Tulis nama lengkap..." required>
                    </div>
                    <div class="field">
                        <label>Alamat Email</label>
                        <input type="email" name="email" placeholder="email@perusahaan.com" required>
                    </div>
                    <div class="field">
                        <label>Pesan</label>
                        <textarea name="pesan" rows="4" placeholder="Apa yang bisa saya bantu?" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Kirim Pesan</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        &copy; 2026 Crafted with Excellence.
    </footer>

    <script>
        // --- LUXURY ENTRANCE LOGIC ---
        window.addEventListener('load', () => {
            const tl = gsap.timeline();

            // 1. Text reveal in loader
            tl.to(".loader-text", {
                y: 0,
                duration: 1,
                ease: "power4.out"
            })
            // 2. Loader slides up like a curtain
            .to(".loader", {
                yPercent: -100,
                duration: 1.2,
                ease: "expo.inOut",
                delay: 0.8
            })
            // 3. Reveal Content
            .to("#nav", {
                opacity: 1,
                duration: 1
            }, "-=0.5")
            .to("#sub", {
                opacity: 1,
                y: 0,
                duration: 1
            }, "-=0.8")
            .to("#title", {
                opacity: 1,
                y: 0,
                duration: 1.2,
                ease: "power4.out"
            }, "-=0.8");
        });

        // --- FORM HANDLING ---
        document.getElementById('portfolioForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "MENGIRIM...";
            
            setTimeout(() => {
                alert('Terima kasih. Pesan Anda telah diterima secara profesional.');
                btn.innerText = "KIRIM PESAN";
                e.target.reset();
            }, 1500);
        });
    </script>
</body>
</html>
